# Deploy twd.hopefullyabysmal.com (static tree) via FTP on push to master.
# Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# If the FTP user does not open in the subdomain document root, add server-dir (see comment below).
name: Deploy via FTP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/README.md
            **/.gitignore
