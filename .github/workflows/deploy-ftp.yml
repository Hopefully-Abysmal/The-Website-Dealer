# Deploy twd.hopefullyabysmal.com (static tree) via FTP on push to master.
# Secrets: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# If the FTP user does not open in the subdomain document root, add server-dir (see comment below).
# Node 24: checkout@v5 is Node 24; FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 opts JS actions (e.g. FTP deploy) off deprecated Node 20.
name: Deploy via FTP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/README.md
            **/.gitignore
